<svg xmlns="http://www.w3.org/2000/svg" width="200" height="320" viewBox="0 0 200 320">
  <defs>
    <linearGradient id="pendblade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8ecf2"/>
      <stop offset="0.5" stop-color="#9aa3b5"/>
      <stop offset="1" stop-color="#565e70"/>
    </linearGradient>
    <radialGradient id="pendrune" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eaf8ff" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#5fc2ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5fc2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 鎖(支点) -->
  <g fill="none" stroke="#3a3f4d" stroke-width="8" stroke-linecap="round">
    <circle cx="100" cy="18" r="12"/>
    <circle cx="100" cy="46" r="12"/>
  </g>
  <rect x="94" y="16" width="12" height="46" fill="#3a3f4d"/>

  <!-- 刃(三日月型) -->
  <path d="M100 68 C 44 78, 30 170, 74 226 C 42 200, 46 128, 100 108 C 154 128, 158 200, 126 226 C 170 170, 156 78, 100 68 Z"
        fill="url(#pendblade)" stroke="#2c303b" stroke-width="6" stroke-linejoin="round"/>

  <!-- 刃先(危険な尖端) -->
  <path d="M100 300 L84 226 L116 226 Z" fill="url(#pendblade)" stroke="#2c303b" stroke-width="5" stroke-linejoin="round"/>

  <!-- 中心の発光ルーン(先送りで位相をずらせる対象の目印) -->
  <circle cx="100" cy="150" r="34" fill="url(#pendrune)"/>
  <circle cx="100" cy="150" r="22" fill="none" stroke="#bfe9ff" stroke-width="3"/>
  <circle cx="100" cy="150" r="6" fill="#ffffff"/>
</svg>
