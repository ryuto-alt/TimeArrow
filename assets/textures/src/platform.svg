<svg xmlns="http://www.w3.org/2000/svg" width="384" height="160" viewBox="0 0 384 160">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c8494"/>
      <stop offset="0.45" stop-color="#4c5262"/>
      <stop offset="1" stop-color="#2c303b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fc2ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#bfe9ff" stop-opacity="1"/>
      <stop offset="1" stop-color="#5fc2ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 足場本体 -->
  <rect x="8" y="30" width="368" height="90" rx="14" fill="url(#metal)" stroke="#1c1f27" stroke-width="6"/>
  <rect x="8" y="30" width="368" height="20" rx="10" fill="#8a92a2" opacity="0.6"/>

  <!-- 発光トリムライン(往復方向を示す帯) -->
  <rect x="20" y="66" width="344" height="8" rx="4" fill="url(#glow)"/>

  <!-- 両端のリベット+歯車 -->
  <g fill="#1c1f27">
    <circle cx="40" cy="75" r="14"/>
    <circle cx="344" cy="75" r="14"/>
  </g>
  <g fill="none" stroke="#bfe9ff" stroke-width="3">
    <circle cx="40" cy="75" r="8"/>
    <circle cx="344" cy="75" r="8"/>
  </g>

  <!-- パネルの継ぎ目 -->
  <g stroke="#1c1f27" stroke-width="3" opacity="0.7">
    <line x1="96" y1="30" x2="96" y2="120"/>
    <line x1="192" y1="30" x2="192" y2="120"/>
    <line x1="288" y1="30" x2="288" y2="120"/>
  </g>
</svg>
