<svg xmlns="http://www.w3.org/2000/svg" width="220" height="260" viewBox="0 0 220 260">
  <defs>
    <radialGradient id="bombbody" cx="0.38" cy="0.34" r="0.75">
      <stop offset="0" stop-color="#5a6274"/>
      <stop offset="0.5" stop-color="#2c303b"/>
      <stop offset="1" stop-color="#14161c"/>
    </radialGradient>
    <radialGradient id="bombrune" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eaf8ff" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#5fc2ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5fc2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe1a3"/>
      <stop offset="1" stop-color="#ff8a2a"/>
