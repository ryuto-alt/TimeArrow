  <path d="M490 46 L430 46 L430 114 L490 114 L466 80 Z" fill="url(#ribbonflag)" stroke="#5a5f6e" stroke-width="4" stroke-linejoin="round"/>

  <!-- 中央プレート -->
  <rect x="60" y="14" width="400" height="132" rx="22" fill="url(#ribbonbase)" stroke="#5a5f6e" stroke-width="6"/>
  <rect x="72" y="22" width="376" height="34" rx="14" fill="#ffffff" opacity="0.55"/>
  <rect x="66" y="20" width="388" height="120" rx="16" fill="none" stroke="#8890a0" stroke-width="2" opacity="0.7"/>
