<svg xmlns="http://www.w3.org/2000/svg" width="520" height="160" viewBox="0 0 520 160">
  <defs>
    <linearGradient id="ribbonbase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9dee8"/>
    </linearGradient>
    <linearGradient id="ribbonflag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7cddb"/>
      <stop offset="1" stop-color="#9aa1b3"/>
    </linearGradient>
  </defs>

  <!-- 左右の折り返しフラグ(先端がV字に切れ込む) -->
