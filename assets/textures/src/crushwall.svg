<svg xmlns="http://www.w3.org/2000/svg" width="320" height="384" viewBox="0 0 320 384">
  <defs>
    <linearGradient id="cwstone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#575c6c"/>
      <stop offset="0.55" stop-color="#3a3f4d"/>
      <stop offset="1" stop-color="#282c37"/>
    </linearGradient>
    <linearGradient id="cwspike" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8ecf2"/>
      <stop offset="0.5" stop-color="#9aa3b5"/>
      <stop offset="1" stop-color="#565e70"/>
    </linearGradient>
    <radialGradient id="cwrune" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eaf8ff" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#5fc2ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5fc2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 石壁本体 -->
  <rect x="60" y="6" width="252" height="372" rx="12" fill="url(#cwstone)" stroke="#1c1f27" stroke-width="7"/>
  <g stroke="#1c1f27" stroke-width="2" opacity="0.55">
    <line x1="60" y1="98" x2="312" y2="98"/>
    <line x1="60" y1="192" x2="312" y2="192"/>
    <line x1="60" y1="286" x2="312" y2="286"/>
  </g>

  <!-- 前面(左端)に並ぶ棘の列。移動方向の"刃"側 -->
  <g fill="url(#cwspike)" stroke="#33384a" stroke-width="4" stroke-linejoin="round">
    <path d="M60 24 L4 52 L60 80 Z"/>
    <path d="M60 96 L4 124 L60 152 Z"/>
    <path d="M60 168 L4 196 L60 224 Z"/>
    <path d="M60 240 L4 268 L60 296 Z"/>
    <path d="M60 312 L4 340 L60 360 Z"/>
  </g>

  <!-- 中央の発光ルーン(先送り対象であることを示す時計目盛) -->
  <circle cx="190" cy="192" r="58" fill="url(#cwrune)"/>
  <circle cx="190" cy="192" r="42" fill="none" stroke="#bfe9ff" stroke-width="4"/>
  <g stroke="#eaf8ff" stroke-width="4" stroke-linecap="round">
    <line x1="190" y1="156" x2="190" y2="140"/>
    <line x1="190" y1="228" x2="190" y2="244"/>
    <line x1="154" y1="192" x2="138" y2="192"/>
    <line x1="226" y1="192" x2="242" y2="192"/>
  </g>
  <circle cx="190" cy="192" r="8" fill="#ffffff"/>
</svg>
