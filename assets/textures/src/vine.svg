<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160" viewBox="0 0 320 160">
  <defs>
    <linearGradient id="vinebody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6fa84a"/>
      <stop offset="0.5" stop-color="#3f7a34"/>
      <stop offset="1" stop-color="#2a5626"/>
    </linearGradient>
  </defs>

  <!-- 蔦の本体(太いつる、伸縮方向=横) -->
  <rect x="4" y="58" width="312" height="44" rx="22" fill="url(#vinebody)" stroke="#22401e" stroke-width="5"/>

  <!-- 巻きひげ(装飾) -->
  <g fill="none" stroke="#2a5626" stroke-width="6" stroke-linecap="round">
    <path d="M40 58 C 30 40, 55 30, 50 15"/>
    <path d="M150 58 C 140 40, 165 30, 160 15"/>
    <path d="M260 58 C 250 40, 275 30, 270 15"/>
    <path d="M90 102 C 85 118, 108 128, 102 145"/>
    <path d="M220 102 C 215 118, 238 128, 232 145"/>
  </g>

  <!-- 葉っぱ -->
  <g fill="#7fc158" stroke="#2a5626" stroke-width="2">
    <ellipse cx="50" cy="12" rx="14" ry="8" transform="rotate(-30 50 12)"/>
    <ellipse cx="160" cy="12" rx="14" ry="8" transform="rotate(20 160 12)"/>
    <ellipse cx="270" cy="12" rx="14" ry="8" transform="rotate(-15 270 12)"/>
    <ellipse cx="102" cy="150" rx="12" ry="7" transform="rotate(40 102 150)"/>
    <ellipse cx="232" cy="150" rx="12" ry="7" transform="rotate(-25 232 150)"/>
  </g>

  <!-- 育っている(スキップ)証の淡い光の実 -->
  <g fill="#eaf8ff" opacity="0.9">
    <circle cx="80" cy="80" r="7"/>
    <circle cx="160" cy="80" r="7"/>
    <circle cx="240" cy="80" r="7"/>
  </g>
  <g fill="none" stroke="#bfe9ff" stroke-width="2" opacity="0.7">
    <circle cx="80" cy="80" r="11"/>
    <circle cx="160" cy="80" r="11"/>
    <circle cx="240" cy="80" r="11"/>
  </g>
</svg>
